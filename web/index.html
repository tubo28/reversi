<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reversi</title>
</head>
<body>
  <main class="app">
    <div class="controls">
      <button id="new-black" type="button">New Game (Black)</button>
      <button id="new-white" type="button">New Game (White)</button>
    </div>

    <div class="scores">
      <span class="score">
        <span class="disk black"></span>
        <span id="black-count">2</span>
      </span>
      <span class="score">
        <span class="disk white"></span>
        <span id="white-count">2</span>
      </span>
    </div>

    <div id="board" class="board" aria-label="Board"></div>

    <p id="status" class="status">Loading…</p>
  </main>

  <script type="module" src="/src/index.ts"></script>
</body>
</html>
